{% extends "admin/base.html" %}
{% block branding %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@700;900&display=swap');
    body, #header, #content, #nav-sidebar, h1, h2, h3, .module caption { font-family: 'Rounded Mplus 1c', sans-serif !important; }

    /* --- PC・共通設定 --- */
    #header {
        background: #1a1c23 !important;
        padding: 15px 25px !important;
        border-bottom: 4px solid transparent !important;
        border-image: linear-gradient(to right, #ff4d94, #2684ff, #f0ad4e) 1 !important;
        display: flex !important;
        align-items: center !important;
        position: relative !important;
    }
    
    #branding {
        margin: 0 !important;
        display: flex !important;
    }

    #branding h1 {
        font-size: 28px !important;
        font-weight: 900 !important;
        display: flex !important;
        align-items: center !important;
        gap: 12px !important;
        background: linear-gradient(to right, #ff69b4, #2684ff, #f0ad4e) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        margin: 0 !important;
    }

    #branding h1::before { content: '💕'; -webkit-text-fill-color: initial !important; font-size: 26px; }
    #branding h1 a { color: inherit !important; text-decoration: none !important; }

    /* ユーザーツール（ログアウト） */
    #header #user-tools { 
        margin-left: auto !important;
        display: flex !important;
        align-items: center !important;
        z-index: 2001 !important;
    }
    #header #user-tools a:not([href*="logout"]), #header #user-tools .divider { display: none !important; }
    #header #user-tools strong { color: #fff !important; margin-right: 10px; font-size: 13px !important; }
    #header #user-tools a[href*="logout"] { 
        font-size: 12px !important; background: #444 !important; color: #fff !important; padding: 4px 10px !important; border-radius: 6px !important; text-decoration: none !important;
    }

    /* --- スマホ専用設定 (768px以下) --- */
    @media (max-width: 768px) {
        #header {
            padding: 15px 0 !important;
            justify-content: center !important;
        }

        #branding {
            width: 100% !important;
            justify-content: center !important; /* 親要素ごと中央へ */
            padding: 0 !important;
        }

        #branding h1 {
            font-size: 20px !important;
            justify-content: center !important;
            width: auto !important;
            /* 左右に透明な絵文字を擬似的に置くことで文字を真ん中に固定 */
            gap: 8px !important;
        }

        /* 中央寄せを完璧にするための透明ダミー */
        #branding h1::after { 
            content: '💕'; 
            visibility: hidden !important; 
            font-size: 20px; 
        }

        /* ログアウトボタンを浮かせて、タイトルの配置計算から除外する */
        #header #user-tools { 
            position: absolute !important; 
            right: 10px !important; 
            top: 50% !important; 
            transform: translateY(-50%) !important;
            margin: 0 !important;
        }

        /* 名前を消してボタンだけにする（スペース確保） */
        #header #user-tools strong { display: none !important; }
        
        /* カードレイアウト調整 */
        .results tr { display: flex !important; flex-direction: column !important; align-items: center !important; margin-bottom: 30px !important; padding: 15px !important; background: #1a1a1a !important; border-radius: 15px !important; position: relative !important; }
        .field-price, td:nth-child(4) { order: 1 !important; color: #ffcc00 !important; font-size: 20px !important; margin-bottom: 10px !important; border: none !important; }
        .field-image, td:has(img) { order: 2 !important; margin-bottom: 10px !important; border: none !important; }
        .field-name, td:nth-child(2) { order: 3 !important; color: #fff !important; font-size: 15px !important; text-align: center !important; border: none !important; }
        td[class*="timer"] { order: 4 !important; color: #00ffcc !important; border: 1px solid #00ffcc !important; border-radius: 20px !important; padding: 5px 15px !important; margin-top: 10px !important; }
        .action-checkbox { position: absolute !important; left: 10px !important; top: 10px !important; transform: scale(1.5) !important; }
    }

    /* 共通UI */
    .breadcrumbs { background: #1a1c23 !important; color: #ccc !important; }
    .app-catalog_a4 caption, .app-catalog_a4 h2 { background: #ff4d94 !important; color: #fff !important; }
    .app-catalog_tcg caption, .app-catalog_tcg h2 { background: #2684ff !important; color: #fff !important; }
    .app-catalog_admin_custom caption, .app-catalog_admin_custom h2 { background: #f0ad4e !important; color: #fff !important; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var header = document.querySelector('#header');
        var breadcrumbs = document.querySelector('.breadcrumbs');
        var navSidebar = document.querySelector('#nav-sidebar');
        var headerH = header ? header.offsetHeight : 75;
        var breadcrumbsH = breadcrumbs ? breadcrumbs.offsetHeight : 37;
        var sidebarW = navSidebar ? navSidebar.offsetWidth : 277;

        if (header) {
            header.style.cssText += 'position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; width: 100% !important; z-index: 2000 !important;';
        }
        if (breadcrumbs) {
            document.body.appendChild(breadcrumbs);
            breadcrumbs.style.cssText = 'position: fixed !important; top: ' + headerH + 'px !important; left: 0 !important; right: 0 !important; width: 100% !important; z-index: 1999 !important; background: #1a1c23 !important; padding: 8px 20px !important; margin: 0 !important;';
        }
        if (navSidebar) {
            navSidebar.style.cssText += 'position: fixed !important; top: ' + (headerH + breadcrumbsH) + 'px !important; left: 0 !important; width: ' + sidebarW + 'px !important; height: calc(100vh - ' + (headerH + breadcrumbsH) + 'px) !important; overflow-y: auto !important; z-index: 1500 !important;';
            var content = document.querySelector('#content');
            if (content) content.style.marginLeft = (window.innerWidth > 768) ? sidebarW + 'px' : '0';
        }
        document.body.style.paddingTop = (headerH + breadcrumbsH) + 'px';
    });

    function formatMobileNames() {
        const names = document.querySelectorAll('.field-name, .field-product_name, td:nth-child(2)');
        names.forEach(cell => {
            if (cell.getAttribute('data-done')) return;
            let text = cell.innerText.split("同人")[0].trim();
            cell.innerHTML = `<strong>${text.replace(/[\s　]+/g, '</strong><br><span style="color:#aaa;font-size:13px;">')}</span>`;
            cell.setAttribute('data-done', 'true');
        });
    }
    document.addEventListener("DOMContentLoaded", formatMobileNames);
    window.addEventListener("load", formatMobileNames);
    setInterval(formatMobileNames, 2000);
</script>

<h1 id="site-name"><a href="{% url 'admin:index' %}">kawaii女の子図鑑</a></h1>
{% endblock %}
