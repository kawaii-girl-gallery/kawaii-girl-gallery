{% extends "admin/base.html" %}
{% block branding %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@700;900&display=swap');
    body, #header, #content, #nav-sidebar, h1, h2, h3, .module caption { font-family: 'Rounded Mplus 1c', sans-serif !important; }

    /* ヘッダー */
    #header {
        background: #1a1c23 !important;
        padding: 15px 0 !important; /* 横のパディングを0にして中央寄せを優先 */
        border-bottom: 4px solid transparent !important;
        border-image: linear-gradient(to right, #ff4d94, #2684ff, #f0ad4e) 1 !important;
        display: flex !important;
        align-items: center !important;
        position: relative !important;
    }
    
    #branding {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 100px !important; /* ★右側のユーザーツールとの衝突を防ぐ余白 */
        box-sizing: border-box !important;
    }

    #branding h1 {
        font-size: 28px !important;
        font-weight: 900 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important; /* 中央寄せ */
        gap: 12px !important;
        background: linear-gradient(to right, #ff69b4, #2684ff, #f0ad4e) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        margin: 0 auto !important;
        position: relative !important;
    }

    /* 左の絵文字 */
    #branding h1::before { 
        content: '💕'; 
        -webkit-text-fill-color: initial !important; 
        font-size: 26px; 
    }
    
    /* 右側にも透明な絵文字を置いて中央を維持 */
    #branding h1::after { 
        content: '💕'; 
        visibility: hidden !important; 
        font-size: 26px; 
    }

    #branding h1 a { color: inherit !important; text-decoration: none !important; }

    /* ユーザーツール（ログアウト周り） */
    #header #user-tools { 
        position: absolute !important;
        right: 20px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        display: flex !important;
        align-items: center !important;
        z-index: 2001 !important;
        margin: 0 !important;
    }
    #header #user-tools a:not([href*="logout"]) { display: none !important; }
    #header #user-tools .divider { display: none !important; }
    
    #header #user-tools strong { 
        font-size: 13px !important; 
        color: #fff !important; 
        margin-right: 8px;
    }
    #header #user-tools a[href*="logout"] { 
        font-size: 12px !important; 
        background: #444 !important;
        color: #fff !important;
        padding: 4px 10px !important;
        border-radius: 6px !important;
        text-decoration: none !important;
    }

    /* パンくず */
    .breadcrumbs { background: #1a1c23 !important; color: #ccc !important; }
    .breadcrumbs a { color: #aaa !important; }

    /* 左メニューの大カテゴリリンク無効化 */
    #nav-sidebar .module caption a, #content-main .module caption a.section { pointer-events: none !important; cursor: default !important; text-decoration: none !important; color: inherit !important; }

    /* カテゴリ色 */
    .app-catalog_pedia caption, .app-catalog_pedia h2, .pedia-mode h2, .pedia-mode caption { background: #6f42c1 !important; color: #fff !important; }
    .app-catalog_a4 caption, .app-catalog_a4 h2 { background: #ff4d94 !important; color: #fff !important; }
    .app-catalog_tcg caption, .app-catalog_tcg h2 { background: #2684ff !important; color: #fff !important; }
    .app-catalog_admin_custom caption, .app-catalog_admin_custom h2, .admin-custom-mode h2, .admin-custom-mode caption { background: #f0ad4e !important; color: #fff !important; }

    /* モーダル関連 */
    .modal-content {
        position: fixed !important;
        top: 45% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        height: 70vh !important;
        max-width: 85vw !important;
        border: 3px solid #fff !important;
        border-radius: 0 !important;
        z-index: 20001 !important;
        display: block !important;
    }

    /* スマホ用：重ならない縦積みカードレイアウト */
    @media (max-width: 768px) {
        #branding { padding: 0 60px !important; } /* スマホ時は右側の余白を少し縮小 */
        #branding h1 { font-size: 20px !important; gap: 6px !important; }
        #branding h1::before, #branding h1::after { font-size: 18px !important; }

        /* ★スマホでは「TEST」を消して、ログアウトボタンのみにする */
        #header #user-tools strong { display: none !important; }
        #header #user-tools { right: 10px !important; }
        
        .results, .results table, .results tbody, .results tr { display: block !important; width: 100% !important; }
        .results thead { display: none !important; }
        .results tr {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            margin-bottom: 35px !important;
            padding: 20px 15px !important;
            background: #1a1a1a !important;
            border: 1px solid #444 !important;
            border-radius: 15px !important;
            position: relative !important;
        }
        .field-price, td:nth-child(4) { display: block !important; order: 1 !important; color: #ffcc00 !important; font-size: 22px !important; font-weight: bold !important; margin-bottom: 15px !important; border: none !important; text-align: center !important; }
        .field-image, td:has(img) { display: block !important; order: 2 !important; margin-bottom: 15px !important; border: none !important; text-align: center !important; }
        .results img { max-width: 200px !important; height: auto !important; border: 2px solid #fff !important; display: block !important; margin: 0 auto !important; }
        .field-name, td:nth-child(2) { display: block !important; order: 3 !important; color: #fff !important; font-size: 16px !important; text-align: center !important; margin-bottom: 15px !important; border: none !important; line-height: 1.4 !important; }
        td[class*="timer"] { display: block !important; order: 4 !important; color: #00ffcc !important; font-weight: bold !important; padding: 8px 20px !important; border: 1px solid #00ffcc !important; border-radius: 20px !important; text-align: center !important; }
        .action-checkbox { position: absolute !important; left: 15px !important; top: 15px !important; transform: scale(1.6) !important; }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var header = document.querySelector('#header');
        var breadcrumbs = document.querySelector('.breadcrumbs');
        var navSidebar = document.querySelector('#nav-sidebar');
        var headerH = header ? header.offsetHeight : 75;
        var breadcrumbsH = breadcrumbs ? breadcrumbs.offsetHeight : 37;
        var sidebarW = navSidebar ? navSidebar.offsetWidth : 277;

        if (header) {
            header.style.cssText += 'position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; width: 100% !important; z-index: 2000 !important;';
        }
        if (breadcrumbs) {
            document.body.appendChild(breadcrumbs);
            breadcrumbs.style.cssText = 'position: fixed !important; top: ' + headerH + 'px !important; left: 0 !important; right: 0 !important; width: 100% !important; z-index: 1999 !important; background: #1a1c23 !important; padding: 8px 20px !important; margin: 0 !important;';
        }
        if (navSidebar) {
            navSidebar.style.cssText += 'position: fixed !important; top: ' + (headerH + breadcrumbsH) + 'px !important; left: 0 !important; width: ' + sidebarW + 'px !important; height: calc(100vh - ' + (headerH + breadcrumbsH) + 'px) !important; overflow-y: auto !important; z-index: 1500 !important;';
            var content = document.querySelector('#content');
            if (content) content.style.marginLeft = (window.innerWidth > 768) ? sidebarW + 'px' : '0';
        }
        document.body.style.paddingTop = (headerH + breadcrumbsH) + 'px';
    });

    function formatMobileNames() {
        const names = document.querySelectorAll('.field-name, .field-product_name, td:nth-child(2)');
        names.forEach(cell => {
            if (cell.getAttribute('data-done')) return;
            let text = cell.innerText.split("同人")[0].trim();
            cell.innerHTML = `<strong>${text.replace(/[\s　]+/g, '</strong><br><span style="color:#aaa;font-size:13px;">')}</span>`;
            cell.setAttribute('data-done', 'true');
        });
    }
    document.addEventListener("DOMContentLoaded", formatMobileNames);
    window.addEventListener("load", formatMobileNames);
    setInterval(formatMobileNames, 2000);
</script>

<h1 id="site-name"><a href="{% url 'admin:index' %}">kawaii女の子図鑑</a></h1>
{% endblock %}
